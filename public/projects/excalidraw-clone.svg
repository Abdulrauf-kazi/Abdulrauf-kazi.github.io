<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e1e" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#glow)"/>
  <!-- Grid -->
  <rect width="1280" height="720" fill="url(#grid)" opacity="0.6"/>

  <!-- Decorative sketch lines (hand-drawn feel) -->
  <line x1="80" y1="300" x2="520" y2="300" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="80" y1="340" x2="400" y2="340" stroke="#222" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="80" y1="380" x2="460" y2="380" stroke="#222" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Sketch rectangle shape -->
  <rect x="80" y="200" width="360" height="220" rx="4" fill="none" stroke="#2e2e2e" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- Arrow sketch -->
  <line x1="480" y1="310" x2="600" y2="310" stroke="#333" stroke-width="2"/>
  <polygon points="595,304 610,310 595,316" fill="#333"/>

  <!-- Second sketch rectangle -->
  <rect x="620" y="220" width="280" height="180" rx="4" fill="none" stroke="#2e2e2e" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- Small circle accent -->
  <circle cx="780" cy="450" r="40" fill="none" stroke="#252525" stroke-width="2"/>
  <circle cx="780" cy="450" r="8" fill="#222"/>

  <!-- Tag -->
  <rect x="80" y="580" width="160" height="28" rx="14" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="599" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#444" text-anchor="middle" letter-spacing="2">CANVAS · REAL-TIME</text>

  <!-- Project number -->
  <text x="80" y="100" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#2a2a2a" letter-spacing="4">01</text>

  <!-- Project title -->
  <text x="80" y="160" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-2">Excalidraw</text>
  <text x="80" y="215" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="#333333" letter-spacing="-2">Clone</text>

  <!-- Subtitle on right -->
  <text x="1200" y="650" font-family="'Inter', sans-serif" font-size="11" fill="#2a2a2a" text-anchor="end" letter-spacing="3">COLLABORATIVE WHITEBOARD</text>
</svg>
