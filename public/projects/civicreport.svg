<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0d0d0d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- City silhouette -->
  <rect x="0"    y="490" width="1280" height="230" fill="#080808"/>
  <!-- Buildings with visible contrast -->
  <rect x="20"  y="410" width="70"  height="80"  fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="35"  y="392" width="40"  height="18"  fill="#0f0f0f"/>
  <rect x="110" y="370" width="90"  height="120" fill="#111"    stroke="#1e1e1e" stroke-width="1"/>
  <rect x="130" y="350" width="50"  height="20"  fill="#111"/>
  <rect x="220" y="420" width="60"  height="70"  fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="300" y="380" width="100" height="110" fill="#101010"  stroke="#1e1e1e" stroke-width="1"/>
  <rect x="320" y="358" width="60"  height="22"  fill="#101010"/>
  <rect x="420" y="400" width="70"  height="90"  fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="510" y="360" width="80"  height="130" fill="#111"    stroke="#1e1e1e" stroke-width="1"/>
  <rect x="530" y="340" width="40"  height="20"  fill="#111"/>
  <rect x="610" y="410" width="55"  height="80"  fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="685" y="375" width="110" height="115" fill="#101010"  stroke="#1e1e1e" stroke-width="1"/>
  <rect x="710" y="352" width="60"  height="23"  fill="#101010"/>
  <rect x="815" y="400" width="65"  height="90"  fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="900" y="370" width="85"  height="120" fill="#111"    stroke="#1e1e1e" stroke-width="1"/>
  <rect x="920" y="350" width="45"  height="20"  fill="#111"/>
  <rect x="1005" y="415" width="60" height="75"  fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="1085" y="380" width="90" height="110" fill="#101010"  stroke="#1e1e1e" stroke-width="1"/>
  <rect x="1105" y="358" width="50" height="22"  fill="#101010"/>
  <rect x="1195" y="400" width="85" height="90"  fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Visible windows in buildings -->
  <rect x="125" y="378" width="7" height="6" fill="#1e1e2a"/>
  <rect x="140" y="378" width="7" height="6" fill="#1a1a1a"/>
  <rect x="315" y="385" width="7" height="6" fill="#1e1e2a"/>
  <rect x="335" y="362" width="7" height="6" fill="#181818"/>
  <rect x="525" y="368" width="7" height="6" fill="#1e1e1e"/>
  <rect x="700" y="360" width="7" height="6" fill="#1e1e2a"/>
  <rect x="720" y="380" width="7" height="6" fill="#181818"/>
  <rect x="915" y="358" width="7" height="6" fill="#1e1e2a"/>
  <rect x="1100" y="365" width="7" height="6" fill="#181818"/>

  <!-- Report form UI -->
  <rect x="80" y="280" width="360" height="32" rx="5" fill="#131313" stroke="#2a2a2a" stroke-width="1"/>
  <text x="100" y="302" font-family="'SF Mono', monospace" font-size="11" fill="#444" letter-spacing="1">📍 Enter your location...</text>

  <rect x="80" y="324" width="360" height="32" rx="5" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="100" y="346" font-family="'SF Mono', monospace" font-size="11" fill="#333" letter-spacing="1">Describe the issue...</text>

  <rect x="80" y="370" width="130" height="32" rx="5" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="145" y="391" font-family="'Inter', sans-serif" font-size="11" fill="#666" text-anchor="middle" letter-spacing="2">SUBMIT →</text>

  <!-- Status badges -->
  <rect x="224" y="374" width="96" height="24" rx="12" fill="#0d180d" stroke="#1e2e1e" stroke-width="1"/>
  <circle cx="240" cy="386" r="4" fill="#2a4a2a"/>
  <text x="268" y="390" font-family="'SF Mono', monospace" font-size="9" fill="#3a5a3a" letter-spacing="1">PENDING</text>

  <rect x="332" y="374" width="108" height="24" rx="12" fill="#180d0d" stroke="#2e1e1e" stroke-width="1"/>
  <circle cx="348" cy="386" r="4" fill="#4a2a2a"/>
  <text x="378" y="390" font-family="'SF Mono', monospace" font-size="9" fill="#5a3a3a" letter-spacing="1">RESOLVED</text>

  <!-- Project title -->
  <text x="80" y="108" font-family="'Inter', sans-serif" font-size="11" fill="#444" letter-spacing="4">03</text>
  <text x="80" y="175" font-family="'Inter', sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-2">CivicReport</text>
  <text x="80" y="232" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#3a3a3a" letter-spacing="-1">City problem reporting platform</text>

  <!-- Tag pill -->
  <rect x="80" y="618" width="160" height="28" rx="14" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="160" y="637" font-family="'SF Mono', monospace" font-size="11" fill="#555" text-anchor="middle" letter-spacing="2">CIVIC · FULL-STACK</text>

  <text x="1200" y="675" font-family="'Inter', sans-serif" font-size="10" fill="#222" text-anchor="end" letter-spacing="3">REPORT · ESCALATE · RESOLVE</text>
</svg>
