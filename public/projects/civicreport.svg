<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#060606;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101010;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- City skyline silhouette (abstract) -->
  <rect x="0" y="560" width="1280" height="160" fill="#070707"/>

  <!-- Buildings -->
  <rect x="50" y="480" width="60" height="80" fill="#0d0d0d"/>
  <rect x="65" y="460" width="30" height="20" fill="#0d0d0d"/>
  <rect x="130" y="440" width="80" height="120" fill="#0c0c0c"/>
  <rect x="150" y="420" width="40" height="20" fill="#0c0c0c"/>
  <rect x="230" y="500" width="50" height="60" fill="#0d0d0d"/>
  <rect x="300" y="460" width="90" height="100" fill="#0b0b0b"/>
  <rect x="320" y="440" width="50" height="20" fill="#0b0b0b"/>
  <rect x="330" y="430" width="30" height="10" fill="#0b0b0b"/>
  <rect x="410" y="490" width="60" height="70" fill="#0d0d0d"/>
  <rect x="490" y="450" width="70" height="110" fill="#0c0c0c"/>
  <rect x="505" y="430" width="40" height="20" fill="#0c0c0c"/>
  <rect x="580" y="500" width="50" height="60" fill="#0d0d0d"/>
  <rect x="650" y="460" width="100" height="100" fill="#0b0b0b"/>
  <rect x="670" y="430" width="60" height="30" fill="#0b0b0b"/>
  <rect x="770" y="490" width="60" height="70" fill="#0d0d0d"/>
  <rect x="850" y="470" width="80" height="90" fill="#0c0c0c"/>
  <rect x="870" y="450" width="40" height="20" fill="#0c0c0c"/>
  <rect x="950" y="500" width="50" height="60" fill="#0d0d0d"/>
  <rect x="1020" y="460" width="70" height="100" fill="#0b0b0b"/>
  <rect x="1035" y="440" width="40" height="20" fill="#0b0b0b"/>
  <rect x="1110" y="490" width="60" height="70" fill="#0d0d0d"/>
  <rect x="1190" y="470" width="80" height="90" fill="#0c0c0c"/>

  <!-- Subtle window lights in buildings -->
  <rect x="140" y="450" width="6" height="5" fill="#1a1a1a"/>
  <rect x="152" y="450" width="6" height="5" fill="#181818"/>
  <rect x="310" y="465" width="6" height="5" fill="#1a1a1a"/>
  <rect x="340" y="445" width="6" height="5" fill="#161616"/>
  <rect x="500" y="455" width="6" height="5" fill="#1a1a1a"/>
  <rect x="660" y="440" width="6" height="5" fill="#181818"/>
  <rect x="860" y="475" width="6" height="5" fill="#1a1a1a"/>
  <rect x="1030" y="465" width="6" height="5" fill="#181818"/>

  <!-- UI elements — report form mockup -->
  <rect x="80" y="320" width="340" height="28" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="96" y="339" font-family="'SF Mono', monospace" font-size="10" fill="#2a2a2a" letter-spacing="1">Report location...</text>

  <rect x="80" y="360" width="340" height="28" rx="4" fill="#0e0e0e" stroke="#1a1a1a" stroke-width="1"/>
  <text x="96" y="379" font-family="'SF Mono', monospace" font-size="10" fill="#222" letter-spacing="1">Describe the issue...</text>

  <rect x="80" y="400" width="120" height="30" rx="4" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
  <text x="140" y="420" font-family="'Inter', sans-serif" font-size="11" fill="#555" text-anchor="middle" letter-spacing="2">SUBMIT →</text>

  <!-- Status pill -->
  <rect x="220" y="404" width="100" height="22" rx="11" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="235" cy="415" r="4" fill="#1f3a1f"/>
  <text x="270" y="419" font-family="'SF Mono', monospace" font-size="9" fill="#2a2a2a" text-anchor="middle" letter-spacing="1">PENDING</text>

  <!-- Tag -->
  <rect x="80" y="580" width="148" height="28" rx="14" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <text x="154" y="599" font-family="'SF Mono', monospace" font-size="11" fill="#333" text-anchor="middle" letter-spacing="2">CIVIC · FULL-STACK</text>

  <!-- Project number -->
  <text x="80" y="100" font-family="'Inter', sans-serif" font-size="13" fill="#222" letter-spacing="4">03</text>

  <!-- Project title -->
  <text x="80" y="160" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-2">CivicReport</text>
  <text x="80" y="215" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="26" font-weight="400" fill="#2a2a2a" letter-spacing="-1">Petition platform for citizens</text>

  <!-- Subtitle -->
  <text x="1200" y="650" font-family="'Inter', sans-serif" font-size="11" fill="#1e1e1e" text-anchor="end" letter-spacing="3">REPORT · ESCALATE · RESOLVE</text>
</svg>
